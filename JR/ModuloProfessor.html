<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Professor</title>
<link rel="stylesheet" href="MainCss.css">
</head>

<body class="mp-body">

  <div class="mp-topo">
    <h1 class="mp-titulo">Painel do Professor</h1>
    <h2 class="mp-subtitulo" id="nomeProfessor">Bem-vindo</h2>
  </div>

  <div class="mp-container">

    <div class="mp-card">
      <h2 class="mp-card-titulo">Lançar Notas</h2>

      <input class="mp-input" id="aluno" placeholder="Nome do Aluno">
      <input class="mp-input" id="mat" placeholder="Matéria">
      <input class="mp-input" id="turma" placeholder="Turma">
      <input class="mp-input" id="nota_1" placeholder="Nota1">
      <input class="mp-input" id="nota_2" placeholder="Nota2">
      <input class="mp-input" id="nota_3" placeholder="Nota3">            
      <input class="mp-input" id="falta" placeholder="Frequência (%)">

      <button class="mp-btn" onclick="lancar()">Lançar</button>
    </div>

  </div>

  <button class="mp-btn-sair" onclick="sair()">Sair</button>

</body>

<script>
/* =========================

let usuario = JSON.parse(localStorage.getItem("usuario_ativo"));

// if (!usuario || usuario.tipo !== "Professor") {

/* =========================
   LOGOUT
========================= */
function sair() {
  localStorage.removeItem("usuario_ativo");
  window.location.href = "index.html";
}

function lancar() {
        let nome = document.getElementById('aluno').value;
        let mat = document.getElementById('mat').value;
        let turma = document.getElementById('turma').value;
        let nota1 = document.getElementById('nota_1').value;
        let nota2 = document.getElementById('nota_2').value;
        let nota3 = document.getElementById('nota_3').value;
        let falta = document.getElementById('falta').value;
        
        let db = JSON.parse(localStorage.getItem('db_alunos'));
        if(db[nome]) {  
            db[nome].materias[mat] = {turmas: turma, Nota1: nota1,Nota2: nota2,Nota3: nota3, falta: falta};
            console.log(db[nome]);
            localStorage.setItem('db_alunos', JSON.stringify(db));
            alert("Nota lançada!");
        }else{
          alert("Aluno não encontrado!");
        }
    }
</script>
