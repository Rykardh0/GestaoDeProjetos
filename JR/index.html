<!DOCTYPE html>
<html lang="pt-br">
<head>
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jr School</title>
<link rel="stylesheet" href="MainCss.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="header">
        <img src="https://i0.wp.com/educacional.com.br/wp-content/uploads/2025/01/infraestrutura-escolar.jpg?fit=1024%2C683&ssl=1" alt="Estudante">
    </div>

    <div class="container">
        <h2>Informe seu Usuario e Senha!</h2>

        <div class="cards">
            <a id="tela-login" class="card active">
                <p class="user-info">Identifique-se para acessar o painel</p>
                <input type="text" id="user_input" placeholder="Usuário">
                <input type="password" id="pass_input" placeholder="Senha">
                <button onclick="autenticar()">Entrar no Sistema</button>
                <p style="font-size: 12px; color: #888;">Contas: admin/123, prof/123, aluno/123</p>
            </a>
            
        </div>
    </div>
<script>
    // BANCO DE DADOS NO CÓDIGO
    const BANCO = {
        "admin": { senha: "123", tipo: "Admin" },
        "prof":  { senha: "123", tipo: "Professor" },
        "aluno": { senha: "123", tipo: "Aluno", materias: {} }
    };

    // LÓGICA DE LOGIN (Sistema Principal)
    function autenticar() {
        const u = document.getElementById('user_input').value;
        const s = document.getElementById('pass_input').value;
        
        //Busca no banco
        let db_alunos = JSON.parse(localStorage.getItem('db_alunos') || '{}');
        let userObj = BANCO[u] || db_alunos[u];

        if (userObj && userObj.senha === s) {
            localStorage.setItem('usuario_ativo', u); // Salva quem logou
            window.location.href = "Modulo"+userObj.tipo + ".html"; // Redireciona: LoginAdmin.html, LoginProfessor.html ou LoginAluno.html
        } else {
            alert("Usuário ou senha inválidos!");
        }
    } 

    </script>

</body>
</html>
