<!DOCTYPE html>
<html lang="pt-br">
<head>

    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jr School</title>
<link rel="stylesheet" href="MainCss.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="BodyIndex">

    <div class="cards">

  <div class="card active">

   
    <div class="lado-imagem">
      <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="Login">
    </div>

    
    <div class="lado-form">

      <h2 class="Userinfo">Informe seu Usuario e Senha!</h2>

      <div class="UserSenha">
        <input type="text" id="user_input" placeholder="Usuário">
        <input type="password" id="pass_input" placeholder="Senha">
      </div>

      <button onclick="autenticar()" class="BotaoIndex">Entrar no Sistema</button>

      <p style="font-size: 12px; color: #888;">
        Contas: admin/123, prof/123, aluno/123
      </p>

    </div>

  </div>

</div>
    

    
<script>
    // BANCO DE DADOS NO CÓDIGO
    const BANCO = {
        "admin": { senha: "123", tipo: "Admin" },
        "prof":  { senha: "123", tipo: "Professor" },
        "aluno": { senha: "123", tipo: "Aluno", materias: {turmas : {Nota1: 0,
                                                                     Nota2: 0,
                                                                     Nota3: 0,
                                                                     falta: 0}} }
    };

    // LÓGICA DE LOGIN (Sistema Principal)
    function autenticar() {
        const u = document.getElementById('user_input').value;
        const s = document.getElementById('pass_input').value;
        
        //Busca no banco
        let db_alunos = JSON.parse(localStorage.getItem('db_alunos') || '{}');
        let userObj = BANCO[u] || db_alunos[u];

        if (userObj && userObj.senha === s) {
            localStorage.setItem('usuario_ativo', u); // Salva quem logou
            window.location.href = "Modulo"+userObj.tipo + ".html"; // Redireciona: LoginAdmin.html, LoginProfessor.html ou LoginAluno.html
        } else {
            alert("Usuário ou senha inválidos!");
        }
    } 

    </script>

</body>
</html>
