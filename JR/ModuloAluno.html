<body class="Body-Adm">
<link rel="stylesheet" href="MainCss.css">

  <div class="topo">
    <h1 class="titulo">Boletim do Aluno</h1>
    <h2 id="nomeAluno"></h2>
  </div>

  <div class="container-painel">

    <div class="PainelRelatorio">
      <h2>Minhas Notas</h2>
      <div id="box"></div>
    </div>

  </div>

  <button class="btn-sair" onclick="sair()">Sair</button>

</body>

<script>
let user = localStorage.getItem('usuario_ativo');
let db = JSON.parse(localStorage.getItem('db_alunos'));
let dados = db[user];

document.getElementById('nomeAluno').innerText = "Olá, " + user;

let tabela = `
<table>
  <thead>
    <tr>
      <th>Disciplina</th>
      <th>Notas</th>
      <th>Média</th>
      <th>Frequência</th>
    </tr>
  </thead>
  <tbody>
`;

if (dados.materias && Object.keys(dados.materias).length > 0) {
  for (let m in dados.materias) {
    let media = parseFloat((parseFloat(dados.materias[m].Nota1)+parseFloat(dados.materias[m].Nota2)+parseFloat(dados.materias[m].Nota3))/3);
    tabela += `
      <tr>
        <td>${m}</td>
        <td>1ª P-${dados.materias[m].Nota1} 2ª P-${dados.materias[m].Nota2} 3ª P-${dados.materias[m].Nota3}</td>
        <td>${media.toFixed(2)}</td>
        <td>${dados.materias[m].falta}%</td>
      </tr>
    `;
  }
} else {
  tabela += `
    <tr>
      <td colspan="3">Nenhuma disciplina cadastrada</td>
    </tr>
  `;
}

tabela += "</tbody></table>";

document.getElementById('box').innerHTML = tabela;

/* LOGOUT */
function sair() {
  localStorage.removeItem("usuario_ativo");
  window.location.href = "index.html";
}
</script>
