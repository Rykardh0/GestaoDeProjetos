  <div class="topo">

  </div>

  <div class="container-painel">

    <div class="PainelCadastro">
      <h2 >Cadastrar Novo Usuário</h2>

      <input type="text" id="n" placeholder="Nome do Usuário">
      <input type="password" id="s" placeholder="Senha">

      <select id="novo_tipo">
        <option value="aluno">Aluno</option>
        <option value="professor">Professor</option>
      </select>

      <button onclick="cadastrar()">Salvar Usuário</button>
    </div>

    <div class="PainelRelatorio">
      <h2>Relatório Geral</h2>
      <button onclick="gerarRelatorio()">Atualizar</button>

      <div id="relatorio-lista" class="Relatorio"></div>
      <div id="relatorio-listaP" class="Relatorio"></div>
    </div>

  </div>

  <button class="btn-sair" onclick="sair()">Sair</button>



<script>

/* =========================

function sair() {
  localStorage.removeItem("usuario_ativo");
  window.location.href = "index.html";
}

/* =========================
   GERAR RELATÓRIO GERAL
========================= */
function gerarRelatorio() {
    let html = "<table><thead><tr><th>NomeAluno</th><th>Disciplinas/Notas</th><th>Disciplinas/Frequência</th></tr></thead><tbody>";
    let html1 = "<table><thead><tr><th>NomeProfessor</th>";
    let encontrou = false;
    
    let BANCO = JSON.parse(localStorage.getItem('db_alunos'));
    // Percorre cada chave (nome de usuário) no banco
    for (let nome in BANCO) {
        let user = BANCO[nome];
        let detalhesN = "";
        let detalhesF = "";

        // Filtra apenas quem é do tipo "aluno"
        if (user.tipo === "Aluno") {
            encontrou = true;
            
            // Pega as matérias desse aluno específico
            for (let m in user.materias) {
                detalhesN += `${m}: ${user.materias[m].nota}<br>`;
                detalhesF += `${m}: ${user.materias[m].falta}%)<br>`;
            }

            html += `<tr>
                        <td><b>${nome}</b></td>
                        <td style="text-align: left;">${detalhesN || "Sem notas"}</td>
                        <td style="text-align: left;">${detalhesF || "Sem Frequencia"}</td>
                     </tr>`;
        }else if (user.tipo === "Professor") {
            encontrou = true;
            html1 += `<tr>
                        <td><b>${nome}</b></td>
                     </tr>`;
        }
    }

    if (!encontrou) html += "<tr><td colspan='3'>Nenhum aluno cadastrado.</td></tr>";
        
    html += "</tbody></table>";
    document.getElementById('relatorio-lista').innerHTML = html;
    html1 += "</tbody></table>";
    document.getElementById('relatorio-listaP').innerHTML = html1;
}

/* =========================
   CADASTRAR
========================= */
    function cadastrar() {
        let nome = document.getElementById('n').value;
        let senha = document.getElementById('s').value;
        let db = JSON.parse(localStorage.getItem('db_alunos') || '{}');
        const select = document.getElementById('novo_tipo');

        if(select.value == "aluno"){
            db[nome] = { senha: senha, tipo: "Aluno", materias: {} };
            localStorage.setItem('db_alunos', JSON.stringify(db));
            alert("Aluno cadastrado!");
        }else{
            db[nome] = { senha: senha, tipo: "Professor"};
            localStorage.setItem('db_alunos', JSON.stringify(db));
            alert("Professor cadastrado!");
        }
    }
